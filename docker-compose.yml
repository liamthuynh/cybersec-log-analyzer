# -----------------------------------------------------------------------
# CyberScope — Docker Compose
# -----------------------------------------------------------------------
# Quick start:
#   cp .env.example .env          # fill in SECRET_KEY & ANTHROPIC_API_KEY
#   docker compose up --build
#
# Services:
#   backend   → Flask REST API       http://localhost:${BACKEND_PORT:-5000}
#   frontend  → Next.js UI           http://localhost:${FRONTEND_PORT:-3000}
# -----------------------------------------------------------------------

services:

  # ---- Database: PostgreSQL -------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: cyberscope-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-cyberscope}
      - POSTGRES_USER=${POSTGRES_USER:-cyberscope}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-cyberscope}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cyberscope} -d ${POSTGRES_DB:-cyberscope}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Backend: Flask REST API ----------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    container_name: cyberscope-backend
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set in .env}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - FLASK_ENV=${FLASK_ENV:-production}
      - FLASK_DEBUG=${FLASK_DEBUG:-0}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-cyberscope}:${POSTGRES_PASSWORD:-cyberscope}@postgres:5432/${POSTGRES_DB:-cyberscope}
    volumes:
      - backend_uploads:/app/uploads
      - ./sample_logs:/app/sample_logs:ro   # read-only sample data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ---- Frontend: Next.js -----------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:5000}
    container_name: cyberscope-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - BACKEND_INTERNAL_URL=${BACKEND_INTERNAL_URL:-http://backend:5000}
    restart: unless-stopped

# ---- Named Volumes -------------------------------------------------------
volumes:
  backend_uploads:
    driver: local
  postgres_data:
    driver: local
